<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Formulario Webhook Make</title>

  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    body {
      background: #f4f6f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card-form {
      width: 100%;
      max-width: 500px;
      border: none;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .btn-enviar {
      width: 100%;
      padding: 12px;
      font-weight: bold;
    }

    .titulo {
      font-weight: 700;
      text-align: center;
      margin-bottom: 25px;
    }
  </style>
</head>
<body>

  <div class="card card-form p-4">
    <h2 class="titulo">Formulario de Registro</h2>

    <form id="formulario">

      <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input
          type="text"
          class="form-control"
          id="nombre"
          required
        />
      </div>

      <div class="mb-3">
        <label class="form-label">Apellido</label>
        <input
          type="text"
          class="form-control"
          id="apellido"
          required
        />
      </div>

      <div class="mb-4">
        <label class="form-label">Edad</label>
        <input
          type="number"
          class="form-control"
          id="edad"
          required
        />
      </div>

      <button type="submit" class="btn btn-primary btn-enviar">
        Enviar
      </button>

    </form>

    <div id="mensaje" class="mt-3 text-center"></div>
  </div>

  <script>
    const formulario = document.getElementById("formulario");
    const mensaje = document.getElementById("mensaje");

    formulario.addEventListener("submit", async (e) => {
      e.preventDefault();

      const datos = {
        nombre: document.getElementById("nombre").value,
        apellido: document.getElementById("apellido").value,
        edad: document.getElementById("edad").value
      };

      try {

        // REEMPLAZAR por tu webhook de Make
        const webhookURL = "https://hook.us2.make.com/nxoj9xeij07wgwtvxwe5czx672rncwct";

        const respuesta = await fetch(webhookURL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(datos)
        });

        if (respuesta.ok) {
          mensaje.innerHTML =
            '<div class="alert alert-success">Datos enviados correctamente</div>';

          formulario.reset();

        } else {
          mensaje.innerHTML =
            '<div class="alert alert-danger">Error al enviar los datos</div>';
        }

      } catch (error) {

        mensaje.innerHTML =
          '<div class="alert alert-danger">No se pudo conectar con el webhook</div>';

        console.error(error);
      }
    });
  </script>

</body>
</html>
